stages:
  - test
  - build
  - deploy

frontend_test:
  stage: test
  image: node:20
  script:
    - cd frontend
    - npm install
    - npm run build
  artifacts:
    paths:
      - frontend/dist
    expire_in: 1 week

backend_check:
  stage: test
  image: python:3.12
  script:
    - cd backend
    - pip install -r requirements.txt
    - python -m compileall .
  artifacts:
    paths:
      - backend
    expire_in: 1 week

package_project:
  stage: build
  image: alpine:3.20
  script:
    - echo "Project structure validated"
    - echo "Frontend build artifact available"
    - echo "Backend syntax validated"
  artifacts:
    paths:
      - frontend
      - backend
      - docker-compose.yml
    expire_in: 1 week

deploy_demo:
  stage: deploy
  image: alpine:3.20
  script:
    - echo "Demo deployment stage ready"
    - echo "Connect this job to your final target later"
  environment:
    name: demo
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"